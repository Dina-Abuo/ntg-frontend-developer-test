<div class="app-wrapper" [class.lang-changing]="isChangingLang()">

  <header class="app-header shadow-sm sticky-top bg-white">
    <!-- Main Nav -->
    <div class="main-nav py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="logo">
          <img src="logo1.png" alt="Elm Logo" height="50" />
        </div>

        <nav class="d-none d-lg-flex gap-4 align-items-center">
          <a href="#" class="nav-item active"
            >{{ 'NAV.ITEM1' | translate }}
            <i class="pi pi-angle-down"></i>
          </a>
          <a href="#" class="nav-item"
            >{{ 'NAV.ITEM2' | translate }}
            <i class="pi pi-angle-down"></i>
          </a>
          <a href="#" class="nav-item"
            >{{ 'NAV.ITEM3' | translate }}
            <i class="pi pi-angle-down"></i>
          </a>
          <a href="#" class="nav-item"
            >{{ 'NAV.ITEM4' | translate }}
            <i class="pi pi-angle-down"></i>
          </a>
          <a href="#" class="nav-item"
            >{{ 'NAV.ITEM5' | translate }}
            <i class="pi pi-angle-down"></i>
          </a>
          <a href="#" class="nav-item"
            >{{ 'NAV.ITEM6' | translate }}
            <i class="pi pi-angle-down"></i>
          </a>
          <a href="#" class="nav-item"
            >{{ 'NAV.ITEM7' | translate }}
            <i class="pi pi-angle-down"></i>
          </a>
        </nav>
        <div class="d-flex justify-content-between align-items-center gap-4">
          <a
            href="#"
            class="header-link d-flex align-items-center gap-1 text-decoration-none text-dark"
          >
            <img src="SearchIcon.svg" alt="SearchIcon" height="18" />
            <span class="small">{{ 'HEADER.SEARCH' | translate }}</span>
          </a>
          <button
            (click)="toggleLanguage()"
            class="btn border-0 p-0 header-link d-flex align-items-center gap-1 text-dark"
          >
            <img src="GlobeIcon.svg" alt="GlobeIcon" height="18" />

            <span class="small">{{ currentLang === 'ar' ? 'English' : 'العربية' }}</span>
          </button>

          <a
            href="#"
            class="header-link d-flex align-items-center gap-1 text-decoration-none text-dark"
          >
            <img src="UserIcon.svg" alt="UserIcon" height="18" />

            <span class="small">{{ 'HEADER.LOGIN' | translate }}</span>
          </a>
        </div>
        <button class="btn d-lg-none">
          <span class="pi pi-bars"></span>
        </button>
      </div>
    </div>
  </header>
</div>
